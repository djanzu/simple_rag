<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat Assistant</title>
    <link rel="stylesheet" href="/static/rag_chat/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">AG RAG</div>
            <div class="status">
                <span class="status-indicator"></span>
                Ollama Connected
            </div>
        </header>

        <main id="chat-window">
            <div class="welcome-message">
                <h1>How can I help you today?</h1>
                <p>I'm your RAG-powered assistant. I can answer questions based on your embedded documents.</p>
            </div>
            <!-- Messages will be injected here -->
        </main>

        <footer>
            <div class="input-container">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Ask anything about your documents..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </footer>
    </div>

    <script src="/static/rag_chat/js/chat.js"></script>
</body>
</html>
