<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat Assistant</title>
    <link rel="stylesheet" href="/static/rag_chat/css/style.css">
    <link rel="stylesheet" href="/static/rag_chat/css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">TSUKUYOMI</div>
            <div class="status">
                <span class="status-indicator"></span>
                Ollama Connected
            </div>
        </header>

        <main id="chat-window">
            <div class="welcome-message">
                <h1>ここは仮想世界、ツクヨミ</h1>
                <p>私は案内人の「月見（るなみ）ヤチヨ」です。ヤッチョと呼ぶべし。</p>
            </div>
            <!-- Messages will be injected here -->
        </main>

        <footer>
            <div class="input-container">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="ヤッチョに聞いてみよう" autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12L2.01 3L2 10l15 2l-15 2z"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </footer>
    </div>

    <script src="/static/rag_chat/js/chat.js"></script>
</body>

</html>
